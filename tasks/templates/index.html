<!DOCTYPE html>
<html>
  <head>
    <!-- 1. Базовые настройки страницы: кодировка и адаптивность -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task Tracker</title>

    <!-- 2. Подключение Bootstrap CSS через CDN для стилизации интерфейса -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  </head>
  <body>
    <!-- 3. Django шаблонный тег csrf_token.
         Используется для защиты форм от CSRF-атак (важно при работе с POST-запросами) -->
    {% csrf_token %}

    <div class="container">
      <br>
      
      <!-- Заголовок приложения -->
      <h2><strong>Task Tracker Кобозев А.Д. 📝</strong></h2>

      <br>

      <!-- 4. Список задач (Bootstrap компонент list-group) -->
      <ul class="list-group">

        <!-- 5. Отдельные элементы списка задач -->
        <li class="list-group-item mb-2">
          1. Проснуться в 8:00.
        </li> 
        <li class="list-group-item mb-2">
          2. Позавтракать.
        </li> 
        <li class="list-group-item mb-2">
          3. Доехать до университета.
        </li>
        <li class="list-group-item mb-2">
          4. Посетить пары.
        </li> 
        <li class="list-group-item mb-2">
          5. Пообедать.
        </li> 
        <li class="list-group-item mb-2">
          6. Вернуться домой.
        </li>
        <li class="list-group-item mb-2">
          7. Пойти спать.
        </li> 

      </ul>

    </div>

    <!-- 6. Подключение Bootstrap JS (bundle включает Popper).
         Необходимо для работы интерактивных компонентов (модальные окна, dropdown и др.) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

  </body>
</html>
